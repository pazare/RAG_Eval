paths:
  passages: hf://datasets/rag-datasets/rag-mini-wikipedia/data/passages.parquet/part.0.parquet
  queries: hf://datasets/rag-datasets/rag-mini-wikipedia/data/test.parquet/part.0.parquet
  milvus_db: data/rag_wikipedia_mini.db
milvus:
  collection: rag_mini
  metric_type: L2
  index:
    type: IVF_FLAT
    nlist: 128
embedding_models:
  baseline: sentence-transformers/all-MiniLM-L6-v2
  alternatives:
  - label: MiniLM-L3 (256d)
    name: sentence-transformers/paraphrase-MiniLM-L3-v2
  - label: MiniLM-L6 (384d)
    name: sentence-transformers/all-MiniLM-L6-v2
  - label: MPNet-Base (768d)
    name: sentence-transformers/all-mpnet-base-v2
retrieval:
  evaluation_queries: 100
  top_k_values:
  - 1
  - 3
  - 5
  - 10
llm:
  generation_model: google/flan-t5-base
  enhanced_generation_model: google/flan-t5-base
  prompt_library:
    baseline: 'Follow these steps to answer the user''s question using only the provided
      context.

      Step 1: Identify all facts in the context that address the question.

      Step 2: Synthesize those facts into a concise answer. If the context lacks the
      needed facts, respond with ''The provided context is insufficient to answer
      the question.''

      '
    verification: 'You are a text-only data verification bot restricted to the provided
      context.

      If the context does not answer the question, respond exactly with ''The provided
      context is insufficient to answer the question.''

      '
enhancements:
  rewrite_strategy: recall
  base_top_k: 10
  rerank_top_k: 3
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
raga_evaluation:
  max_workers: 16
  sample_size: 100  # Assignment requirement: n=100 samples for RAGAs evaluation
  openai_model: gpt-4o-mini
results:
  directory: results
  files:
    naive_metrics: modular_naive_results.json
    enhanced_metrics: modular_enhanced_results.json
    prompt_comparison: modular_prompt_comparison.csv
    embedding_sweeps: modular_embedding_experiments.csv
    enhanced_summary: modular_enhanced_summary.csv
    ragas_comparison: modular_ragas_comparison.csv
    ragas_delta: modular_ragas_delta.csv
seed:
  numpy: 42
  torch: 42
  ragas: 42
evaluation_plan:
  baseline:
    prompt: baseline
    top_k: 1
  prompt_variant:
    prompt: verification
    top_k: 1
  embedding_sweeps:
  - embedding: MiniLM-L6 (384d)
    top_k_values:
    - 3
    - 5
    - 10
  - embedding: MiniLM-L3 (256d)
    top_k_values:
    - 3
    - 5
    - 10
  enhanced:
    prompt: baseline
    base_top_k: 10
    rerank_top_k: 3
    rewrite_strategy: recall
  ragas:
    systems:
    - naive
    - enhanced
    sample_size: 100
